ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        # Modules are loaded programmatically via embeddedServer, not via this config
    }
}

adminos {
    database {
        url = "jdbc:postgresql://localhost:5432/adminos"
        url = ${?DATABASE_URL}
        user = "adminos"
        user = ${?DB_USER}
        password = "adminos"
        password = ${?DB_PASSWORD}
        maxPoolSize = 10
    }
    redis {
        url = "redis://localhost:6379"
        url = ${?REDIS_URL}
    }
    auth {
        jwtSecret = "CHANGE-ME-generate-with-openssl-rand-base64-32"
        jwtSecret = ${?JWT_SECRET}
        jwtIssuer = "adminos"
        accessTokenTtlSeconds = 3600
        refreshTokenTtlDays = 30
        googleClientId = ""
        googleClientId = ${?GOOGLE_CLIENT_ID}
        googleClientSecret = ""
        googleClientSecret = ${?GOOGLE_CLIENT_SECRET}
    }
    app {
        url = "http://localhost:3000"
        url = ${?APP_URL}
        apiUrl = "http://localhost:8080"
        apiUrl = ${?API_URL}
    }
}
